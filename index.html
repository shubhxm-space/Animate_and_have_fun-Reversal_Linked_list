<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Linked List Reverser</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #ec4899;
            --bg: #f8fafc;
            --node-bg: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #1e293b; margin-bottom: 10px; }
        
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 30px; display: flex; gap: 10px; }
        
        input { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; }
        button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-add { background: var(--primary); color: white; }
        .btn-reverse { background: var(--secondary); color: white; }
        .btn-reset { background: #64748b; color: white; }

        #container { display: flex; align-items: center; justify-content: center; min-height: 200px; gap: 0; flex-wrap: wrap; width: 90%; }

        .node-wrapper { display: flex; align-items: center; transition: all 0.5s ease; }
        
        .node {
            width: 60px; height: 60px; border: 3px solid #1e293b; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            background: var(--node-bg); font-weight: bold; font-size: 1.2rem;
            position: relative; transition: all 0.5s ease;
        }

        .node.active-curr { border-color: var(--secondary); box-shadow: 0 0 15px var(--secondary); }
        .node.active-prev { border-color: #10b981; box-shadow: 0 0 15px #10b981; }

        .arrow {
            width: 40px; height: 2px; background: #1e293b; position: relative;
            margin: 0 5px; transition: all 0.5s ease;
        }
        .arrow::after {
            content: ''; position: absolute; right: 0; top: -4px;
            width: 0; height: 0; border-top: 5px solid transparent;
            border-bottom: 5px solid transparent; border-left: 8px solid #1e293b;
        }

        .reversed-arrow { transform: rotate(180px); background: var(--secondary); }
        .reversed-arrow::after { border-left-color: var(--secondary); }

        .status-msg { margin-top: 20px; font-style: italic; color: #475569; height: 24px; }
        
        .pointer-labels { display: flex; gap: 20px; margin-top: 10px; font-size: 0.9rem; }
        .label-p { color: #10b981; font-weight: bold; }
        .label-c { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Linked List Reversal Visualizer</h1>

    <div class="controls">
        <input type="number" id="nodeVal" placeholder="Value">
        <button class="btn-add" onclick="addNode()">Add Node</button>
        <button class="btn-reverse" onclick="startReversal()">Reverse Step-by-Step</button>
        <button class="btn-reset" onclick="resetList()">Reset</button>
    </div>

    <div id="container"></div>
    
    <div class="status-msg" id="status">Add nodes to begin...</div>
    
    <div class="pointer-labels">
        <span class="label-p">● Prev Pointer</span>
        <span class="label-c">● Curr Pointer</span>
    </div>

    <script>
        let list = [];
        let isReversing = false;
        let pIdx = -1;
        let cIdx = 0;

        function addNode() {
            if(isReversing) return;
            const val = document.getElementById('nodeVal').value || Math.floor(Math.random() * 100);
            list.push({ val: val, reversed: false });
            render();
        }

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            list.forEach((node, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'node-wrapper';
                
                const nodeDiv = document.createElement('div');
                nodeDiv.className = `node ${i === cIdx && isReversing ? 'active-curr' : ''} ${i === pIdx && isReversing ? 'active-prev' : ''}`;
                nodeDiv.innerText = node.val;
                
                wrapper.appendChild(nodeDiv);

                if (i < list.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = `arrow ${node.reversed ? 'reversed-arrow' : ''}`;
                    // Special logic for visual reversal: in a real list the arrow flips. 
                    // To keep UI simple, we just highlight it.
                    wrapper.appendChild(arrow);
                }
                
                container.appendChild(wrapper);
            });
        }

        async function startReversal() {
            if (list.length < 2 || isReversing) return;
            isReversing = true;
            pIdx = -1;
            cIdx = 0;
            
            const status = document.getElementById('status');

            for (let i = 0; i <= list.length; i++) {
                if (cIdx < list.length) {
                    status.innerText = `Step ${i+1}: Pointer 'next' stores node ${cIdx + 1}. Flipping arrow of Node ${list[cIdx].val}.`;
                    list[cIdx].reversed = true;
                } else {
                    status.innerText = "Reversal Complete! New Head is " + list[list.length-1].val;
                }
                
                render();
                await new Promise(r => setTimeout(r, 1500));
                
                pIdx = cIdx;
                cIdx++;
            }
            isReversing = false;
        }

        function resetList() {
            list = [];
            isReversing = false;
            pIdx = -1;
            cIdx = 0;
            document.getElementById('status').innerText = "List cleared.";
            render();
        }
    </script>
</body>
</html>
